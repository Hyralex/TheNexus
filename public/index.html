<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nexus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.0/dist/htmx.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="bi bi-rocket-takeoff"></i>
        <strong>The Nexus</strong>
      </div>
      <ul class="menu">
        <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a href="/sessions"><i class="bi bi-clock-history"></i> Sessions</a></li>
        <li><a href="/gateway"><i class="bi bi-hdd-network"></i> Gateway</a></li>
      </ul>
      <div class="sidebar-footer">
        <small><i class="bi bi-circle-fill status-dot"></i> Online</small>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page">
        <header class="page-header">
          <h1><i class="bi bi-speedometer2"></i> Dashboard</h1>
          <div class="status-badge">
            <span class="dot"></span>
            <span id="server-status">Connected</span>
          </div>
        </header>
        
        <div class="dashboard-grid">
          <!-- Active Agents Panel -->
          <section class="card">
            <header>
              <h2><i class="bi bi-lightning-charge-fill"></i> Active Now</h2>
              <small>Last 5 minutes</small>
            </header>
            <div id="active-agents" hx-get="/api/sessions/active" hx-trigger="load, every 10s">
              <div class="loading"><i class="bi bi-arrow-clockwise spinning"></i> Loading...</div>
            </div>
          </section>
          
          <!-- Activity Feed -->
          <section class="card">
            <header>
              <h2><i class="bi bi-activity"></i> Activity Feed</h2>
              <button class="icon-btn" hx-get="/api/activity" hx-target="#activity-feed" hx-trigger="load, every 5s" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </header>
            <div id="activity-feed" class="activity-feed">
              <div class="loading"><i class="bi bi-arrow-clockwise spinning"></i> Loading...</div>
            </div>
          </section>
        </div>
        
        <!-- All Sessions -->
        <section class="card full-width">
          <header>
            <h2><i class="bi bi-clock-history"></i> All Sessions</h2>
            <button class="icon-btn" hx-get="/api/sessions" hx-target="#sessions-list" hx-trigger="load, every 30s" title="Refresh">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </header>
          <div id="sessions-list">
            <div class="loading"><i class="bi bi-arrow-clockwise spinning"></i> Loading sessions...</div>
          </div>
        </section>
      </div>
      
      <!-- Sessions Page -->
      <div id="page-sessions" class="page">
        <header class="page-header">
          <h1><i class="bi bi-clock-history"></i> Sessions</h1>
        </header>
        <section class="card full-width">
          <div id="sessions-full-list" hx-get="/api/sessions" hx-trigger="load">
            <div class="loading"><i class="bi bi-arrow-clockwise spinning"></i> Loading...</div>
          </div>
        </section>
      </div>
      
      <!-- Gateway Page -->
      <div id="page-gateway" class="page">
        <header class="page-header">
          <h1><i class="bi bi-hdd-network"></i> Gateway</h1>
        </header>
        <section class="card full-width">
          <div class="placeholder-content">
            <i class="bi bi-cone-striped"></i>
            <p>Coming soon - Gateway health, config, and logs</p>
          </div>
        </section>
      </div>
    </main>
  </div>
  
  <script>
    // Handle URL routing on page load
    function handleRouting() {
      const path = window.location.pathname;
      let page = 'dashboard';
      
      if (path === '/sessions') page = 'sessions';
      else if (path === '/gateway') page = 'gateway';
      else page = 'dashboard';
      
      // Show the right page
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      
      // Update menu active state
      document.querySelectorAll('.menu a').forEach(a => {
        a.classList.remove('active');
        if (a.getAttribute('href') === '/' && page === 'dashboard') a.classList.add('active');
        else if (a.getAttribute('href') === '/' + page) a.classList.add('active');
      });
      
      // Update page title
      const titles = {
        'dashboard': 'Dashboard | The Nexus',
        'sessions': 'Sessions | The Nexus',
        'gateway': 'Gateway | The Nexus'
      };
      document.title = titles[page];
    }
    
    // Run on load
    handleRouting();
    
    // Active agents formatter
    htmx.on('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'active-agents') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        const sessions = data.sessions || [];
        
        if (sessions.length === 0) {
          evt.detail.target.innerHTML = '<div class="empty-state"><i class="bi bi-check-circle"></i><p>No active agents</p></div>';
          return;
        }
        
        const agents = sessions.map(s => {
          const age = formatAge(s.ageMs);
          const model = s.model || '?';
          const isSubagent = s.key.includes(':subagent:');
          const agentType = isSubagent ? 'subagent' : 'agent';
          const agentIcon = isSubagent ? 'bi-robot' : 'bi-cpu';
          return `
            <div class="agent-item">
              <div class="agent-icon"><i class="bi ${agentIcon}"></i></div>
              <div class="agent-info">
                <strong>${s.agentId || 'unknown'}</strong>
                <small>${agentType} · ${model}</small>
              </div>
              <div class="agent-meta">
                <span class="badge">${age}</span>
              </div>
            </div>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = agents;
      }
      
      // Activity feed formatter
      if (evt.detail.target.id === 'activity-feed') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        const activities = data.recent || [];
        
        if (activities.length === 0) {
          evt.detail.target.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No recent activity</p></div>';
          return;
        }
        
        const items = activities.map(a => {
          const time = new Date(a.timestamp).toLocaleTimeString();
          const icon = getActivityIcon(a.type);
          return `
            <div class="activity-item ${a.type}">
              <span class="activity-icon">${icon}</span>
              <div class="activity-content">
                <strong>${a.agent}</strong>
                <span>${a.message}</span>
              </div>
              <small class="activity-time">${time}</small>
            </div>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = '<div class="activity-list">' + items + '</div>';
      }
      
      // Sessions formatter (both dashboard and full page)
      const sessionTargets = ['sessions-list', 'sessions-full-list'];
      if (sessionTargets.includes(evt.detail.target.id)) {
        const data = JSON.parse(evt.detail.xhr.responseText);
        if (data.error) {
          evt.detail.target.innerHTML = `<div class="error-state"><i class="bi bi-exclamation-triangle"></i><p>Error: ${data.error}</p></div>`;
          return;
        }
        
        const sessions = data.sessions || [];
        if (sessions.length === 0) {
          evt.detail.target.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No sessions found</p></div>';
          return;
        }
        
        const rows = sessions.map(s => {
          const age = formatAge(s.ageMs);
          const agent = s.agentId || 'main';
          const model = s.model || 'unknown';
          const tokens = s.totalTokens?.toLocaleString() || '0';
          const isSubagent = s.key.includes(':subagent:');
          const agentIcon = isSubagent ? 'bi-robot' : 'bi-cpu';
          return `
            <tr>
              <td><span class="kind-icon"><i class="bi ${agentIcon}"></i></span> <code>${agent}</code></td>
              <td>${model}</td>
              <td>${tokens}</td>
              <td><span class="age-badge">${age}</span></td>
            </tr>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = `
          <div class="table-responsive">
            <table role="grid">
              <thead>
                <tr>
                  <th>Agent</th>
                  <th>Model</th>
                  <th>Tokens</th>
                  <th>Age</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
          <div class="table-footer"><small>Total: ${sessions.length} sessions</small></div>
        `;
      }
    });
    
    function formatAge(ms) {
      if (!ms) return '?';
      const mins = Math.floor(ms / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      
      if (days > 0) return `${days}d`;
      if (hours > 0) return `${hours}h`;
      return `${mins}m`;
    }
    
    function getActivityIcon(type) {
      switch(type) {
        case 'new_session': return '<i class="bi bi-plus-circle-fill"></i>';
        case 'activity': return '<i class="bi bi-lightning-fill"></i>';
        case 'completed': return '<i class="bi bi-check-circle-fill"></i>';
        default: return '<i class="bi bi-dot"></i>';
      }
    }
  </script>
</body>
</html>
