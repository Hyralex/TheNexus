<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nexus Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.0/dist/htmx.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <strong>🚀 The Nexus</strong>
      </div>
      <ul class="menu">
        <li><a href="/" class="active">Dashboard</a></li>
        <li><a href="/sessions">Sessions</a></li>
        <li><a href="/gateway">Gateway</a></li>
      </ul>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <h1>Dashboard</h1>
        <div class="status-indicator" id="server-status">
          <span class="dot"></span>
          <span id="status-text">Connecting...</span>
        </div>
      </header>
      
      <div class="dashboard-grid">
        <!-- Active Agents Panel -->
        <section class="card">
          <header>
            <h2>● Active Now</h2>
            <small>Last 5 minutes</small>
          </header>
          <div id="active-agents" hx-get="/api/sessions/active" hx-trigger="load, every 10s">
            <p>Loading active agents...</p>
          </div>
        </section>
        
        <!-- Activity Feed -->
        <section class="card">
          <header>
            <h2>Activity Feed</h2>
            <button class="refresh-btn" hx-get="/api/activity" hx-target="#activity-feed" hx-trigger="load, every 5s">
              ↻
            </button>
          </header>
          <div id="activity-feed" class="activity-feed">
            <p>Waiting for activity...</p>
          </div>
        </section>
      </div>
      
      <!-- All Sessions -->
      <section class="card full-width">
        <header>
          <h2>All Sessions</h2>
          <button class="refresh-btn" hx-get="/api/sessions" hx-target="#sessions-list" hx-trigger="load, every 30s">
            ↻ Refresh
          </button>
        </header>
        <div id="sessions-list">
          <p>Loading sessions...</p>
        </div>
      </section>
    </main>
  </div>
  
  <script>
    // Server status
    htmx.on('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'server-status') {
        document.getElementById('status-text').textContent = 'Connected';
      }
    });
    
    // Active agents formatter
    htmx.on('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'active-agents') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        const sessions = data.sessions || [];
        
        if (sessions.length === 0) {
          evt.detail.target.innerHTML = '<p class="muted">No active agents</p>';
          return;
        }
        
        const agents = sessions.map(s => {
          const age = formatAge(s.ageMs);
          const kind = s.kind || 'direct';
          const model = s.model || '?';
          return `
            <div class="agent-item">
              <div class="agent-info">
                <strong>${s.agentId || 'unknown'}</strong>
                <small>${kind} · ${model}</small>
              </div>
              <div class="agent-meta">
                <span class="badge">${age}</span>
              </div>
            </div>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = agents;
      }
      
      // Activity feed formatter
      if (evt.detail.target.id === 'activity-feed') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        const activities = data.recent || [];
        
        if (activities.length === 0) {
          evt.detail.target.innerHTML = '<p class="muted">No recent activity</p>';
          return;
        }
        
        const items = activities.map(a => {
          const time = new Date(a.timestamp).toLocaleTimeString();
          const icon = getActivityIcon(a.type);
          return `
            <div class="activity-item ${a.type}">
              <span class="activity-icon">${icon}</span>
              <div class="activity-content">
                <strong>${a.agent}</strong>
                <span>${a.message}</span>
              </div>
              <small class="activity-time">${time}</small>
            </div>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = items;
      }
      
      // Sessions formatter
      if (evt.detail.target.id === 'sessions-list') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        if (data.error) {
          evt.detail.target.innerHTML = `<p class="error">Error: ${data.error}</p>`;
          return;
        }
        
        const sessions = data.sessions || [];
        if (sessions.length === 0) {
          evt.detail.target.innerHTML = '<p>No sessions found</p>';
          return;
        }
        
        const rows = sessions.map(s => {
          const age = formatAge(s.ageMs);
          const kind = s.kind || 'direct';
          const agent = s.agentId || 'main';
          const model = s.model || 'unknown';
          const tokens = s.totalTokens?.toLocaleString() || '0';
          return `
            <tr>
              <td><code>${agent}/${kind}</code></td>
              <td>${model}</td>
              <td>${tokens}</td>
              <td>${age}</td>
            </tr>
          `;
        }).join('');
        
        evt.detail.target.innerHTML = `
          <table role="grid">
            <thead>
              <tr>
                <th>Agent/Kind</th>
                <th>Model</th>
                <th>Tokens</th>
                <th>Age</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
          <small>Total: ${sessions.length} sessions</small>
        `;
      }
    });
    
    function formatAge(ms) {
      if (!ms) return '?';
      const mins = Math.floor(ms / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      
      if (days > 0) return `${days}d`;
      if (hours > 0) return `${hours}h`;
      return `${mins}m`;
    }
    
    function getActivityIcon(type) {
      switch(type) {
        case 'new_session': return '🆕';
        case 'activity': return '⚡';
        case 'completed': return '✅';
        default: return '•';
      }
    }
  </script>
</body>
</html>
